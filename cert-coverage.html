<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certification Coverage — Windows AD Pentesting Skill</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    padding: 32px 24px 64px;
  }
  .page { max-width: 820px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 28px; }
  .back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: #8b949e; text-decoration: none;
    margin-bottom: 16px; transition: color .15s;
  }
  .back:hover { color: #58a6ff; }
  .back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
  .title { font-size: 22px; font-weight: 600; color: #e6edf3; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #8b949e; }

  /* Summary row */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }
  .sum-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 14px;
    text-align: center;
  }
  .sum-num { font-size: 22px; font-weight: 600; }
  .sum-label { font-size: 11px; color: #8b949e; margin-top: 2px; }

  /* Cert cards grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .card:hover { border-color: #58a6ff; background: #1c2230; }
  .card.active { border: 2px solid #1f6feb; background: #1c2230; }
  .card-name { font-size: 16px; font-weight: 600; color: #e6edf3; margin-bottom: 1px; }
  .card-org { font-size: 11px; color: #8b949e; margin-bottom: 10px; }
  .bar-track { background: #21262d; border-radius: 4px; height: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .bar-pct { font-size: 11px; color: #8b949e; margin-top: 5px; text-align: right; }

  /* Detail panel */
  .detail {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 20px;
    display: none;
    animation: fadeIn .2s ease;
  }
  .detail.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .detail-head {
    display: flex; align-items: flex-start; gap: 14px;
    margin-bottom: 16px; padding-bottom: 14px;
    border-bottom: 1px solid #21262d;
  }
  .detail-info { flex: 1; }
  .detail-name { font-size: 18px; font-weight: 600; color: #e6edf3; }
  .detail-org { font-size: 12px; color: #8b949e; margin-top: 1px; }
  .detail-focus { font-size: 13px; color: #8b949e; margin-top: 6px; line-height: 1.5; }
  .big-pct { font-size: 32px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }

  /* Topics */
  .topics { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .topic-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    background: #0d1117;
    border-radius: 7px;
    font-size: 13px;
  }
  .topic-name { flex: 1; color: #c9d1d9; }
  .topic-phase { font-size: 11px; color: #6e7681; min-width: 80px; text-align: right; }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
    white-space: nowrap; margin-left: 4px;
  }
  .b-full    { background: #1a3d1f; color: #3fb950; }
  .b-partial { background: #3d2e0a; color: #d29922; }
  .b-thin    { background: #0c2d6b; color: #58a6ff; }
  .b-gap     { background: #3d0f0f; color: #f85149; }

  /* Legend */
  .legend {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding-top: 12px; border-top: 1px solid #21262d;
    margin-bottom: 14px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #8b949e; }

  /* Verdict */
  .verdict {
    padding: 10px 14px;
    border-radius: 8px;
    background: #0d1117;
    font-size: 13px;
    color: #c9d1d9;
    border-left: 3px solid;
    line-height: 1.6;
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #21262d;
    font-size: 12px;
    color: #6e7681;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer a { color: #58a6ff; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <a class="back" href="README.md">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to README
    </a>
    <div class="title">Certification Coverage</div>
    <div class="subtitle">Windows AD Pentesting Skill — topic-by-topic mapping against 6 certifications</div>
  </div>

  <div class="summary" id="summary"></div>
  <div class="cards" id="cards"></div>
  <div class="detail" id="detail"></div>

  <div class="footer">
    <span>Windows AD Pentesting Skill · 18 phases · 4,575 lines</span>
    <a href="https://github.com" target="_blank">View on GitHub ↗</a>
  </div>

</div>

<script>
const certs = [
  {
    id: 'oscp', name: 'OSCP', org: 'OffSec',
    focus: 'Practical exploitation — AD chain mandatory in exam since 2022',
    verdict: 'Excellent. Every topic on the OSCP AD module is covered in depth. The skill goes well beyond OSCP scope.',
    vc: '#3fb950',
    topics: [
      { n: 'AD enumeration (BloodHound, PowerView)',    p: 'Phase 03', c: 'full' },
      { n: 'Password spraying + lockout policy check',  p: 'Phase 02', c: 'full' },
      { n: 'Kerberoasting + AS-REP Roasting',           p: 'Phase 04', c: 'full' },
      { n: 'Pass-the-Hash / Pass-the-Ticket',           p: 'Phase 05', c: 'full' },
      { n: 'PsExec, WMI, Evil-WinRM lateral move',      p: 'Phase 05', c: 'full' },
      { n: 'ACL abuse (GenericAll, WriteDACL)',          p: 'Phase 06', c: 'full' },
      { n: 'DCSync + secretsdump',                      p: 'Phase 07', c: 'full' },
      { n: 'NTLM relay (Responder + ntlmrelayx)',        p: 'Phase 04', c: 'full' },
      { n: 'Report writing — findings + remediation',   p: 'Phase 12', c: 'full' },
      { n: 'Evasion basics (AV, AMSI)',                  p: 'Phase 11', c: 'partial' },
    ]
  },
  {
    id: 'pnpt', name: 'PNPT', org: 'TCM Security',
    focus: 'Heavy AD focus — practical exam on a full AD environment',
    verdict: 'Excellent. PNPT is heavily AD-focused and every exam topic is covered. The skill also covers advanced topics well beyond PNPT scope.',
    vc: '#3fb950',
    topics: [
      { n: 'LLMNR/NBT-NS poisoning (Responder)',        p: 'Phase 02', c: 'full' },
      { n: 'Password spraying (kerbrute, nxc)',          p: 'Phase 02', c: 'full' },
      { n: 'BloodHound + attack path analysis',          p: 'Phase 03', c: 'full' },
      { n: 'Kerberoasting + AS-REP Roasting',           p: 'Phase 04', c: 'full' },
      { n: 'Token impersonation',                        p: 'Phase 05', c: 'partial' },
      { n: 'GPP / cpassword (MS14-025)',                 p: 'Phase 04', c: 'full' },
      { n: 'Golden Ticket + persistence',                p: 'Phases 07–08', c: 'full' },
      { n: 'Report writing + executive summary',         p: 'Phase 12', c: 'full' },
      { n: 'OSINT + external recon',                    p: 'Phase 01', c: 'full' },
    ]
  },
  {
    id: 'crto', name: 'CRTO', org: 'Zero-Point Security',
    focus: 'Red team ops with Cobalt Strike — C2, evasion, OPSEC discipline',
    verdict: 'Very good. Strong on AD attacks. Thin on C2 operation and pivoting — CRTO relies heavily on Cobalt Strike tradecraft which is out of scope here.',
    vc: '#d29922',
    topics: [
      { n: 'Full enumeration chain (LDAP, BloodHound)', p: 'Phase 03', c: 'full' },
      { n: 'Delegation attacks (RBCD, unconstrained)',   p: 'Phase 06', c: 'full' },
      { n: 'DPAPI + credential theft',                  p: 'Phase 15', c: 'full' },
      { n: 'GPO abuse',                                 p: 'Phase 06', c: 'full' },
      { n: 'Forest trust attacks',                      p: 'Phase 09', c: 'full' },
      { n: 'Persistence (AdminSDHolder, DSRM, etc.)',   p: 'Phase 08', c: 'full' },
      { n: 'OPSEC discipline + evasion',                p: 'Phase 11', c: 'partial' },
      { n: 'C2 framework operation (Cobalt Strike)',     p: 'Phase 11', c: 'thin' },
      { n: 'Pivoting / port forwarding',                p: '—',        c: 'gap' },
    ]
  },
  {
    id: 'crte', name: 'CRTE', org: 'Altered Security',
    focus: 'Pure multi-domain AD attacks — the deepest AD-specific cert',
    verdict: 'Excellent for Windows AD topics. The only gap is Azure AD hybrid attacks — CRTE covers on-prem ↔ cloud chains which are explicitly out of this skill\'s scope.',
    vc: '#3fb950',
    topics: [
      { n: 'Full ACL exploitation chain',               p: 'Phase 06', c: 'full' },
      { n: 'All three delegation types',                p: 'Phase 06', c: 'full' },
      { n: 'Child → parent escalation (SID History)',   p: 'Phase 09', c: 'full' },
      { n: 'MSSQL lateral movement',                    p: 'Phase 14', c: 'full' },
      { n: 'AD CS (ESC1–ESC16)',                        p: 'Phase 10', c: 'full' },
      { n: 'gMSA + sMSA abuse',                        p: 'Phase 16', c: 'full' },
      { n: 'Diamond / Sapphire Tickets',                p: 'Phase 13', c: 'full' },
      { n: 'ADIDNS / wpad abuse',                       p: 'Phase 16', c: 'full' },
      { n: 'Advanced Kerberos (noPac, KrbRelay)',        p: 'Phase 13', c: 'full' },
      { n: 'Azure AD / Entra ID hybrid attacks',        p: '—',        c: 'gap' },
    ]
  },
  {
    id: 'ejpt', name: 'eJPT', org: 'eLearnSecurity',
    focus: 'Entry-level — basic pentesting including light AD exposure',
    verdict: 'More than enough. eJPT barely touches AD. The skill covers everything eJPT needs and vastly more. Only gap is Metasploit-specific modules (out of scope).',
    vc: '#3fb950',
    topics: [
      { n: 'Network discovery + port scanning',         p: 'Phase 03', c: 'full' },
      { n: 'SMB enumeration + null sessions',           p: 'Phase 03', c: 'full' },
      { n: 'Basic credential attacks',                  p: 'Phase 04', c: 'full' },
      { n: 'Simple lateral movement (PsExec)',          p: 'Phase 05', c: 'full' },
      { n: 'Basic report writing',                      p: 'Phase 12', c: 'full' },
      { n: 'Metasploit usage',                         p: '—',        c: 'gap' },
    ]
  },
  {
    id: 'osep', name: 'OSEP', org: 'OffSec',
    focus: 'Advanced evasion, process injection, C2 development, AD at scale',
    verdict: 'Good for the AD portions. OSEP is an advanced evasion cert — it goes deeper on shellcode, loader dev, and C2 internals than this skill covers. Use as AD supplement.',
    vc: '#d29922',
    topics: [
      { n: 'Process injection primitives',              p: 'Phase 11', c: 'partial' },
      { n: 'AMSI/ETW bypass depth',                    p: 'Phase 11', c: 'partial' },
      { n: 'Custom C2 / shellcode loaders',            p: 'Phase 11', c: 'thin' },
      { n: 'AD at scale (large env techniques)',        p: 'Phases 03–09', c: 'full' },
      { n: 'SCCM + WSUS attacks',                      p: 'Phase 17', c: 'full' },
      { n: 'Phishing + initial access tradecraft',      p: 'Phase 02', c: 'partial' },
      { n: 'Linux + macOS pivoting',                   p: '—',        c: 'gap' },
      { n: 'Antivirus bypass development',              p: 'Phase 11', c: 'thin' },
    ]
  },
];

const W = { full: 1, partial: 0.6, thin: 0.3, gap: 0 };
const pct = t => Math.round(t.reduce((s, x) => s + W[x.c], 0) / t.length * 100);
const barColor = p => p >= 85 ? '#3fb950' : p >= 65 ? '#d29922' : '#f85149';
const bClass = c => ({ full: 'b-full', partial: 'b-partial', thin: 'b-thin', gap: 'b-gap' })[c];
const bLabel = c => ({ full: 'Covered', partial: 'Partial', thin: 'Thin', gap: 'Gap' })[c];

let active = null;

// Summary row
function renderSummary() {
  const all = certs.map(c => pct(c.topics));
  const avg = Math.round(all.reduce((a, b) => a + b, 0) / all.length);
  const fullCount = certs.flatMap(c => c.topics).filter(t => t.c === 'full').length;
  const gapCount  = certs.flatMap(c => c.topics).filter(t => t.c === 'gap').length;
  document.getElementById('summary').innerHTML = [
    { num: certs.length,  label: 'Certifications mapped', color: '#e6edf3' },
    { num: avg + '%',     label: 'Average coverage',      color: barColor(avg) },
    { num: fullCount,     label: 'Fully covered topics',  color: '#3fb950' },
    { num: gapCount,      label: 'Out-of-scope gaps',     color: '#f85149' },
  ].map(s => `<div class="sum-card">
    <div class="sum-num" style="color:${s.color}">${s.num}</div>
    <div class="sum-label">${s.label}</div>
  </div>`).join('');
}

// Cards
function renderCards() {
  document.getElementById('cards').innerHTML = certs.map(c => {
    const p = pct(c.topics);
    return `<div class="card${active === c.id ? ' active' : ''}" onclick="select('${c.id}')">
      <div class="card-name">${c.name}</div>
      <div class="card-org">${c.org}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${barColor(p)}"></div></div>
      <div class="bar-pct">${p}% covered</div>
    </div>`;
  }).join('');
}

// Detail
window.select = function(id) {
  active = id;
  renderCards();
  const c = certs.find(x => x.id === id);
  const p = pct(c.topics);
  const el = document.getElementById('detail');
  el.className = 'detail show';
  el.innerHTML = `
    <div class="detail-head">
      <div class="detail-info">
        <div class="detail-name">${c.name} <span style="font-size:13px;font-weight:400;color:#8b949e">— ${c.org}</span></div>
        <div class="detail-focus">${c.focus}</div>
      </div>
      <div class="big-pct" style="color:${barColor(p)}">${p}%</div>
    </div>
    <div class="topics">
      ${c.topics.map(t => `
        <div class="topic-row">
          <span class="topic-name">${t.n}</span>
          <span class="topic-phase">${t.p}</span>
          <span class="badge ${bClass(t.c)}">${bLabel(t.c)}</span>
        </div>`).join('')}
    </div>
    <div class="legend">
      <div class="legend-item"><span class="badge b-full">Covered</span> Full depth in skill</div>
      <div class="legend-item"><span class="badge b-partial">Partial</span> Lighter than cert needs</div>
      <div class="legend-item"><span class="badge b-thin">Thin</span> Concepts only</div>
      <div class="legend-item"><span class="badge b-gap">Gap</span> Not in skill scope</div>
    </div>
    <div class="verdict" style="border-color:${c.vc}">${c.verdict}</div>`;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
};

renderSummary();
renderCards();
select('crte');
</script>
</body>
</html>
